name: BRISC2025 Auto Research

on:
  # 手动触发
  workflow_dispatch:
  # 每4小时自动运行（可根据需要调整）
  schedule:
    - cron: '0 */4 * * *'

env:
  PYTHON_VERSION: '3.10'

jobs:
  auto-research:
    runs-on: macos-latest
    timeout-minutes: 180  # 3小时超时
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install torch torchvision numpy pillow matplotlib tqdm scikit-learn
      
      - name: Load experiment history
        uses: actions/cache@v4
        with:
          path: experiments/auto_research
          key: experiments-${{ github.run_id }}
          restore-keys: experiments-
      
      - name: 📋 Generate experiment plan
        id: generate
        run: |
          python auto_research.py 2>&1 | tee plan_output.txt
          
          # 提取实验ID
          EXP_ID=$(grep "实验ID:" plan_output.txt | cut -d: -f2 | tr -d ' ' | head -1)
          echo "exp-id=$EXP_ID" >> $GITHUB_OUTPUT
          echo "Generated experiment: $EXP_ID"
      
      - name: 🚀 Run experiment
        id: run
        run: |
          python auto_research_runner.py 2>&1 | tee run_output.txt
          
          # 提取结果
          DICE=$(grep -oE 'Dice=[0-9.]+' run_output.txt | tail -1 | cut -d= -f2 || echo "0.0")
          echo "dice=$DICE" >> $GITHUB_OUTPUT
          echo "Experiment completed with Dice: $DICE"
      
      - name: 📊 Generate visualizations
        id: viz
        run: |
          python auto_research_viz.py 2>&1 | tee viz_output.txt
      
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: auto-research-results-${{ steps.generate.outputs.exp-id }}-${{ github.run_id }}
          path: |
            experiments/auto_research/
            *.txt
          retention-days: 30
      
      - name: 📝 Create summary
        if: always()
        run: |
          EXP_ID="${{ steps.generate.outputs.exp-id }}"
          DICE="${{ steps.run.outputs.dice }}"
          
          echo "# BRISC2025 Auto Research 实验报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 实验ID | $EXP_ID |" >> $GITHUB_STEP_SUMMARY
          echo "| Dice Score | $DICE |" >> $GITHUB_STEP_SUMMARY
          echo "| 状态 | ${{ steps.run.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[查看详细日志](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
      
      - name: 💾 Commit results
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # 添加所有实验结果
          git add experiments/auto_research/ || true
          
          # 如果有变更则提交
          if ! git diff --staged --quiet; then
            git commit -m "Auto Research: Experiment ${{ steps.generate.outputs.exp-id }} completed [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
